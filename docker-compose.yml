services:
  blazorapp:
    build: .
    container_name: team-13-blazor-app
    ports:
      - "5500:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - DOTNET_RUNNING_IN_CONTAINER=true
    restart: "no"

#run using "docker-compose --build" then access using http://localhost:5500